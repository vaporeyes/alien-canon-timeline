<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Canon Timeline | Interactive Experience</title>
    <meta name="description" content="Interactive chronological timeline of the Alien franchise canon including films, games, comics, books, and short films.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <h1 class="title">ALIEN CANON TIMELINE</h1>
            <div class="subtitle">Weyland-Yutani Corp // Classified Chronological Database</div>
        </header>

        <!-- Controls -->
        <div class="controls">
            <div class="filter-controls" id="filterControls">
                <button class="filter-btn active" data-filter="all">All</button>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search timeline..." aria-label="Search timeline events">
            </div>
        </div>

        <!-- Timeline (vertical, scrollable) -->
        <div class="timeline-viewport" id="timelineViewport">
            <div class="timeline" id="timelineEvents"></div>
        </div>

        <!-- Stats Panel -->
        <div class="stats-panel" id="statsPanel">
            <div class="stat-item">
                <span class="stat-label">Total Events:</span>
                <span class="stat-value" id="statTotal">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Visible:</span>
                <span class="stat-value" id="statVisible">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Years Covered:</span>
                <span class="stat-value" id="statYears">0</span>
            </div>
        </div>
    </div>

    <!-- Scanline effect overlay -->
    <div class="scanline-overlay"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
